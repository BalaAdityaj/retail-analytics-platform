name: Retail Analytics CI/CD Pipeline

on:
  push:
    branches: [ main, feature/*, release/* ]
  pull_request:
    branches: [ main ]

jobs:

  # ═══════════════════════════════════════════════════════
  # JOB 1: CI — Code Quality & Tests
  # ═══════════════════════════════════════════════════════

  continuous_integration:
    name: CI — Code Quality & Tests
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Python syntax
        run: |
          echo "Checking DAG syntax..."
          python -m py_compile dags/retail_pipeline.py
          echo "✅ DAG syntax valid"

      - name: Validate SQL file exists
        run: |
          echo "Checking SQL files..."
          if [ -f "sql/gold_views.sql" ]; then
            echo "✅ gold_views.sql found"
          else
            echo "❌ gold_views.sql missing"
            exit 1
          fi

      - name: Validate DAG structure
        run: |
          python - <<EOF
          import ast, sys

          print('Reading DAG file...')
          with open('dags/retail_pipeline.py', 'r') as f:
              source = f.read()

          try:
              ast.parse(source)
              print('✅ Python syntax valid')
          except SyntaxError as e:
              print(f'❌ Syntax error: {e}')
              sys.exit(1)

          required_tasks = [
              'incremental_ingestion',
              'bronze_load',
              'silver_transformation',
              'validation_checks',
              'gold_aggregation'
          ]

          for task in required_tasks:
              if task in source:
                  print(f'✅ task found → {task}')
              else:
                  print(f'❌ missing task → {task}')
                  sys.exit(1)

          if 'retries' not in source:
              print('❌ retries missing'); sys.exit(1)

          if 'sla' not in source:
              print('❌ SLA missing'); sys.exit(1)

          if 'on_failure_callback' not in source:
              print('❌ failure callback missing'); sys.exit(1)

          if 'EmailOperator' not in source:
              print('❌ EmailOperator missing'); sys.exit(1)

          if 'retail_medallion_pipeline' not in source:
              print('❌ DAG ID missing'); sys.exit(1)

          if '0 6 * * *' not in source and '0 8 * * *' not in source:
              print('❌ schedule missing'); sys.exit(1)

          print("================================")
          print("All tests PASSED ✅")
          print("================================")
          EOF

  # ═══════════════════════════════════════════════════════
  # JOB 2: Deploy to DEV
  # ═══════════════════════════════════════════════════════

  deploy_dev:
    name: CD — Deploy to DEV
    runs-on: ubuntu-latest
    needs: continuous_integration
    if: startsWith(github.ref, 'refs/heads/feature/')

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to DEV
        run: |
          echo "DEPLOYING TO DEV"
          echo "Branch: ${{ github.ref_name }}"
          echo "Schema: medallion_dev"
          echo "✅ Deployment complete"

  # ═══════════════════════════════════════════════════════
  # JOB 3: Deploy to TEST
  # ═══════════════════════════════════════════════════════

  deploy_test:
    name: CD — Deploy to TEST
    runs-on: ubuntu-latest
    needs: continuous_integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to TEST
        run: |
          echo "DEPLOYING TO TEST"
          echo "Schema: medallion_test"
          echo "✅ Deployment complete"

  # ═══════════════════════════════════════════════════════
  # JOB 4: Deploy to PROD (AUTO)
  # ═══════════════════════════════════════════════════════

  deploy_prod:
    name: CD — Deploy to PROD
    runs-on: ubuntu-latest
    needs: deploy_test
    if: startsWith(github.ref, 'refs/heads/release/')

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to PROD
        run: |
          echo "DEPLOYING TO PROD"
          echo "Branch: ${{ github.ref_name }}"
          echo "Schema: medallion_prod"
          echo "✅ Deployment complete"
